<!doctype html>
<html lang="ru" data-screen-label="HoReCa · Доставка mockup (v4)">
<head>
  <meta charset="utf-8">
  <title>HoReCa · Доставка · mockup v4</title>
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; }
    body { background: var(--bg-app); font-family: var(--font-sans); }
    * { box-sizing: border-box; }
    .app { width: 100%; min-height: 100vh; display: flex; flex-direction: column; }
    .row { flex: 1; display: flex; gap: 0; min-height: 0; }
    .main { flex: 1; padding: 0 16px 16px; min-width: 0; display: flex; flex-direction: column; }
    @keyframes pp-fade-in   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes pp-slide-in  { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes pp-fade-up   { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- CDN deps. `integrity` + `crossorigin` removed so the page works under file:// -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <!-- v4 mockup. Differences vs v3:
       1. DeliveryToolbar — без кнопки «Курьеры» (только Очередь / Отчёты + Новый заказ).
       2. + Новый заказ — двухшаговый full-page flow (детали → блюда) вместо right-side sheet.
          Step 1 (NewOrderDetailsPage): гость / адрес / время / комментарий / способ оплаты (tile-grid retail/PaymentSheet).
          Step 2 (NewOrderMenuPage): full-page 3-column menu по образцу retail/{Cart, Catalog}.jsx.
       3. CourierDetailSheet / DeliveryCouriers / CourierCard убраны — нет точки входа.
          Назначение курьера переехало в popover «Назначить курьера» внутри OrderDetailSheet (как было в v3).
       -->

  <script type="text/babel" data-presets="env,react">
    // -------- Icon.jsx (Heroicons v1 outline subset) --------
    const Icon = {
      Menu: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 6h16M4 12h16M4 18h16" /></svg>),
      Search: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="11" cy="11" r="7" /><path d="m20 20-4-4" /></svg>),
      ChevronDown: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 9l6 6 6-6" /></svg>),
      ChevronDoubleLeft: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M11 17l-5-5 5-5M18 17l-5-5 5-5" /></svg>),
      ArrowLeft: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M19 12H5" /><path d="M12 19l-7-7 7-7" /></svg>),
      ArrowRight: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14" /><path d="M12 5l7 7-7 7" /></svg>),
      Plus: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14M12 5v14" /></svg>),
      Minus: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14" /></svg>),

      ViewList: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M8 6h13M8 12h13M8 18h13" /><circle cx="4" cy="6" r="1" /><circle cx="4" cy="12" r="1" /><circle cx="4" cy="18" r="1" /></svg>),
      Photograph: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="5" width="18" height="14" rx="2" /><circle cx="9" cy="11" r="2" /><path d="M3 17l5-5 4 4 3-3 6 6" /></svg>),
      Power: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 2v8" /><path d="M5 7a8 8 0 1 0 14 0" /></svg>),
      Bell: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M6 9a6 6 0 1 1 12 0v4l2 3H4l2-3V9z" /><path d="M10 19a2 2 0 0 0 4 0" /></svg>),
      Clock: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="9" /><path d="M12 7v5l3 2" /></svg>),
      Bill: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M7 3h10v18l-2-1-2 1-2-1-2 1-2-1-2 1V3z" /><path d="M10 8h4M10 12h4M10 16h2" /></svg>),
      Users: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="9" cy="9" r="3" /><path d="M3 19c0-3 2.5-5 6-5s6 2 6 5" /><circle cx="17" cy="9" r="2.5" /><path d="M14.5 19c0-2 1.5-4 3.5-4s3.5 1.5 3.5 3" /></svg>),
      Chart: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 3v18h18" /><path d="M8 14l3-3 3 3 4-6" /></svg>),

      Support: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="9" /><circle cx="12" cy="12" r="4" /><path d="M5 5l3 3M16 16l3 3M16 8l3-3M5 19l3-3" /></svg>),
      Cog: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" /></svg>),
      Newspaper: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 5h16v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5z" /><path d="M8 9h8M8 13h8M8 17h5" /></svg>),
      Grid2x2: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="3" width="7" height="7" rx="1" /><rect x="14" y="3" width="7" height="7" rx="1" /><rect x="3" y="14" width="7" height="7" rx="1" /><rect x="14" y="14" width="7" height="7" rx="1" /></svg>),
      Cash: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="7" width="18" height="10" rx="2" /><circle cx="12" cy="12" r="2.5" /><path d="M6 9v6M18 9v6" /></svg>),
      CreditCard: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><rect x="3" y="6" width="18" height="13" rx="2" /><path d="M3 10h18" /><path d="M7 15h4" /></svg>),
      Sync: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 4v6h6" /><path d="M20 20v-6h-6" /><path d="M5 10a8 8 0 0 1 14-3" /><path d="M19 14a8 8 0 0 1-14 3" /></svg>),
      Moon: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M20 14.5A8 8 0 1 1 9.5 4a7 7 0 0 0 10.5 10.5z" /></svg>),
      Fullscreen: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 9V4h5" /><path d="M20 9V4h-5" /><path d="M4 15v5h5" /><path d="M20 15v5h-5" /></svg>),
      PowerLogout: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M14 4h5a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1h-5" /><path d="M10 8l-4 4 4 4" /><path d="M6 12h12" /></svg>),
      MapPin: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 22s7-7.5 7-13a7 7 0 0 0-14 0c0 5.5 7 13 7 13z" /><circle cx="12" cy="9" r="2.5" /></svg>),
      Pencil: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 20h4l10-10-4-4L4 16v4z" /><path d="M14 6l4 4" /></svg>),
      Phone: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.86 19.86 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.8a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.84.57 2.8.7A2 2 0 0 1 22 16.92z" /></svg>),
      Check: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12l5 5L20 7" /></svg>),
      Trash: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M4 7h16" /><path d="M10 11v6M14 11v6" /><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13" /><path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3" /></svg>),
      Folder: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" /></svg>),
      Star: ({ size = 24, color = "currentColor", ...p }) => (<svg viewBox="0 0 24 24" width={size} height={size} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M12 3l2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 17.8l-5.8 3.1 1.1-6.5L2.6 9.8l6.5-.9L12 3z" /></svg>),
    };
    window.Icon = Icon;

    // -------- TopBar.jsx (kit copy) --------
    const topBarStyles = {
      bar: { height: 96, background: "var(--bg-app)", padding: "16px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16, boxSizing: "border-box", flex: "0 0 auto" },
      group: { display: "flex", alignItems: "center", gap: 16 },
      pill: { height: 64, background: "var(--bg-card)", borderRadius: 20, boxShadow: "var(--shadow-1)", display: "flex", alignItems: "center", padding: "0 24px", gap: 12, fontFamily: "var(--font-sans)", fontWeight: 500, fontSize: 18, letterSpacing: "-0.005em", color: "var(--fg-1)", cursor: "pointer", border: 0 },
      iconBtn: { width: 64, height: 64, borderRadius: 20, background: "var(--bg-card)", boxShadow: "var(--shadow-1)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", border: 0 },
      textBlock: { display: "flex", flexDirection: "column", justifyContent: "center" },
      body: { fontFamily: "var(--font-sans)", fontWeight: 500, fontSize: 18, lineHeight: "22px", color: "var(--fg-1)", letterSpacing: "-0.005em" },
      label: { fontFamily: "var(--font-sans)", fontSize: 16, lineHeight: "20px", color: "var(--fg-2)", letterSpacing: "-0.010em", marginTop: 4 },
      divider: { width: 1, height: 32, background: "rgba(34,34,34,0.18)" },
      profile: { height: 64, background: "var(--bg-card)", borderRadius: 20, boxShadow: "var(--shadow-1)", display: "flex", alignItems: "center", padding: "4px 24px 4px 4px", gap: 16 },
      avatar: { width: 56, height: 56, borderRadius: 16, background: "var(--success-400)", display: "flex", alignItems: "center", justifyContent: "center", color: "#fff", fontFamily: "var(--font-sans)", fontWeight: 700, fontSize: 16, letterSpacing: "-0.010em" },
      rightInline: { display: "flex", alignItems: "center", gap: 12, padding: "0 8px 0 0", fontFamily: "var(--font-sans)", fontSize: 18, color: "var(--fg-1)", cursor: "pointer" },
      dot: { width: 12, height: 12, borderRadius: "50%", background: "var(--success-500)", boxShadow: "0 0 0 3px rgba(77,191,115,0.25)" },
      notifBtn: { position: "relative" },
      notifDot: { position: "absolute", top: 14, right: 14, minWidth: 18, height: 18, padding: "0 5px", borderRadius: 9, background: "var(--danger-500)", border: "2px solid #fff", color: "#fff", fontFamily: "var(--font-sans)", fontWeight: 700, fontSize: 11, lineHeight: "14px", display: "flex", alignItems: "center", justifyContent: "center" },
    };

    function TopBar({ onMenuClick, showMenu = true, tenantName = "Korzinka OOO", validUntil = "2024.05.29", openedAt = "10 декабря, 09:23", userName = "Исмаилов Темур", userRole = "Продавец", initials = "ИТ", mode = "Кассовый режим", shiftOpen = true, onToggleShift, onSync, onToggleTheme, onToggleFullscreen, onNotifications, notificationCount, onLogout } = {}) {
      const shiftLabel = shiftOpen ? "Закрыть смену" : "Открыть смену";
      const shiftIconColor = shiftOpen ? "var(--danger-500)" : "var(--fg-1)";
      const showOpenedAt = shiftOpen && openedAt;
      return (
        <div style={topBarStyles.bar}>
          <div style={topBarStyles.group}>
            {showMenu && (<button style={topBarStyles.iconBtn} aria-label="menu" onClick={onMenuClick}><Icon.Menu size={32} /></button>)}
            <button style={topBarStyles.pill} onClick={onToggleShift} aria-label={shiftLabel}>
              <Icon.Power size={28} color={shiftIconColor} /><span>{shiftLabel}</span>
            </button>
            {showOpenedAt && (<div style={topBarStyles.textBlock}><span style={topBarStyles.body}>{openedAt}</span><span style={topBarStyles.label}>Время открытия смены</span></div>)}
            <div style={topBarStyles.divider}></div>
            <div style={topBarStyles.textBlock}><span style={topBarStyles.body}>{tenantName}</span><span style={topBarStyles.label}>Срок действия: {validUntil}</span></div>
          </div>
          <div style={topBarStyles.group}>
            <div style={topBarStyles.rightInline}><span>{mode}</span><span style={topBarStyles.dot}></span></div>
            <button style={topBarStyles.iconBtn} aria-label="sync" onClick={onSync}><Icon.Sync size={28} color="var(--fg-1)" /></button>
            <button style={{ ...topBarStyles.iconBtn, ...topBarStyles.notifBtn }} aria-label="notifications" onClick={onNotifications}>
              <Icon.Bell size={28} />
              {notificationCount != null ? (<span style={topBarStyles.notifDot}>{notificationCount}</span>) : (<span style={{ ...topBarStyles.notifDot, minWidth: 8, height: 8, padding: 0, borderRadius: 4 }} />)}
            </button>
            <button style={topBarStyles.iconBtn} aria-label="theme" onClick={onToggleTheme}><Icon.Moon size={28} color="var(--fg-1)" /></button>
            <button style={topBarStyles.iconBtn} aria-label="fullscreen" onClick={onToggleFullscreen}><Icon.Fullscreen size={28} color="var(--fg-1)" /></button>
            <div style={topBarStyles.profile}>
              <div style={topBarStyles.avatar}>{initials}</div>
              <div style={topBarStyles.textBlock}><span style={{ ...topBarStyles.body, textAlign: "right" }}>{userName}</span><span style={{ ...topBarStyles.label, textAlign: "right" }}>{userRole}</span></div>
            </div>
            <button style={topBarStyles.iconBtn} aria-label="logout" onClick={onLogout}><Icon.PowerLogout size={28} color="var(--fg-1)" /></button>
          </div>
        </div>
      );
    }
    window.TopBar = TopBar;

    // -------- SidebarRail.jsx (kit copy) --------
    const sidebarRailStyles = {
      rail: { width: 96, background: "var(--bg-card)", display: "flex", flexDirection: "column", paddingTop: 16, flex: "0 0 96px", minHeight: "100%" },
      topGroup: { display: "flex", flexDirection: "column" },
      bottomGroup: { display: "flex", flexDirection: "column", marginTop: "auto", paddingBottom: 8 },
      collapse: { width: 64, height: 64, margin: "0 auto 12px", borderRadius: 20, background: "var(--bg-card)", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" },
      item: { display: "flex", flexDirection: "column", alignItems: "center", gap: 6, padding: "16px 8px", borderRadius: 8, cursor: "pointer", margin: "0 0", color: "var(--fg-3)", transition: "background 120ms ease, color 120ms ease" },
      itemActive: { background: "rgba(40,184,235,0.15)", borderTop: "1px solid var(--brand-500)", borderBottom: "1px solid var(--brand-500)", color: "var(--fg-1)", borderRadius: 0 },
      label: { fontFamily: "var(--font-sans)", fontWeight: 500, fontSize: 14, lineHeight: "18px", letterSpacing: "-0.010em", textAlign: "center", whiteSpace: "pre-line" },
      divider: { height: 1, background: "var(--fg-5)", margin: "0 0" },
    };
    function SidebarItem({ icon, label, active, onClick }) {
      const Ic = icon;
      const color = active ? "var(--brand-500)" : "var(--fg-3)";
      return (<div style={{ ...sidebarRailStyles.item, ...(active ? sidebarRailStyles.itemActive : null) }} onClick={onClick}><Ic size={32} color={color} /><span style={sidebarRailStyles.label}>{label}</span></div>);
    }
    function defaultHorecaTop() {
      return [
        { key: "analytics", label: "Аналитика",        icon: Icon.Chart },
        { key: "orders",    label: "Заказы",           icon: Icon.Grid2x2 },
        { key: "journal",   label: "Журнал",           icon: Icon.Bill },
        { key: "clients",   label: "Клиенты",          icon: Icon.Users },
        { key: "finance",   label: "Финансы",          icon: Icon.Cash },
        { key: "catalog",   label: "Каталог\nтоваров", icon: Icon.Newspaper },
        { key: "warehouse", label: "Склад",            icon: Icon.Box },
      ];
    }
    function defaultHorecaBottom() {

      const [deliveryView, setDeliveryView] = React.useState("queue");
      const [reportPeriod, setReportPeriod] = React.useState("today");

      const counts = (tables || []).reduce((acc, t) => {
        const s = t.status || "free";
        if (s === "busy") acc.busy += 1;
        else if (s === "reserved") acc.reserved += 1;
        else acc.free += 1;
        return acc;
      }, { free: 0, busy: 0, reserved: 0 });

      let deliveryBody = null;
      if (isDelivery) {
        if (deliveryView === "reports") deliveryBody = <DeliveryReports kpis={reports && reports.kpis} channels={reports && reports.channels} topCouriers={reports && reports.topCouriers} period={reportPeriod} onPeriodChange={setReportPeriod} />;

        <div style={tablesStyles.board}>

    // ---------- Step 1: NewOrderDetailsPage ----------
    function NewOrderDetailsPage({ state, onChange, onCancel, onNext }) {
      const [historyOpen, setHistoryOpen] = React.useState(false);
      const [showCustomTime, setShowCustomTime] = React.useState(!!state.customTime);
      const [foundCustomer, setFoundCustomer] = React.useState(null);

      const phoneDigits = state.customer.phone.replace(/\D/g, "");
      const handleFind = () => {
        if (phoneDigits.length >= 7) {
          const found = { name: "Алишер Каримов", lastOrder: "15.05.2026" };
          setFoundCustomer(found);
          onChange({ ...state, customer: { ...state.customer, name: found.name } });
        }
      };
      // Auto-show "found" hint when ≥7 digits typed.
      React.useEffect(() => {
        if (phoneDigits.length >= 7 && !foundCustomer) {
          setFoundCustomer({ name: "Алишер Каримов", lastOrder: "15.05.2026" });
        }
        if (phoneDigits.length < 7 && foundCustomer) setFoundCustomer(null);
      }, [phoneDigits]);

      const PAY_METHODS = [
        { key: "cash",   label: "Наличные (при получении)", icon: Icon.Cash },
        { key: "humo",   label: "Карта Humo",                icon: Icon.CreditCard },
        { key: "uzcard", label: "Карта Uzcard",              icon: Icon.CreditCard },
        { key: "click",  label: "Click",                      icon: Icon.Grid2x2 },
        { key: "payme",  label: "Payme",                      icon: Icon.Grid2x2 },
      ];

      const canNext =
        phoneDigits.length >= 7
        && state.customer.name.trim().length > 0
        && state.address.trim().length > 0
        && !!state.payment;

      return (
        <div style={flowStyles.page}>
          <div style={flowStyles.subHeader}>
            <button style={flowStyles.backPill} onClick={onCancel} aria-label="back">
              <Icon.ArrowLeft size={18} color="var(--fg-1)" /><span>Назад</span>
            </button>
            <span style={flowStyles.pageTitle}>Новый заказ — детали</span>
            <div style={flowStyles.spacer} />
            <span style={flowStyles.metaText}>13:08 · TEST (IRGASHEV)</span>
          </div>

          <div style={flowStyles.detailsBody}>
            <div style={flowStyles.detailsCol}>
              {/* Гость */}
              <div style={flowStyles.section}>
                <span style={flowStyles.sectionTitle}>Гость</span>
                <div style={flowStyles.fieldGroup}>
                  <span style={flowStyles.label}>Телефон</span>
                  <div style={flowStyles.inputWithBtn}>
                    <input
                      style={{ ...flowStyles.input, flex: 1 }}
                      placeholder="+998 __ ___ __ __"
                      value={state.customer.phone}
                      onChange={(e) => onChange({ ...state, customer: { ...state.customer, phone: e.target.value } })}
                    />
                    <button style={flowStyles.inlineBtn} onClick={handleFind}>Найти</button>
                  </div>
                  {foundCustomer && (
                    <span style={flowStyles.hintFound}>Найден: {foundCustomer.name}, последний заказ {foundCustomer.lastOrder}</span>
                  )}
                </div>
                <div style={flowStyles.fieldGroup}>
                  <span style={flowStyles.label}>Имя</span>
                  <input
                    style={flowStyles.input}
                    placeholder="Имя гостя"
                    value={state.customer.name}
                    onChange={(e) => onChange({ ...state, customer: { ...state.customer, name: e.target.value } })}
                  />
                </div>
              </div>

              {/* Адрес */}
              <div style={flowStyles.section}>
                <span style={flowStyles.sectionTitle}>Адрес доставки</span>
                <div style={flowStyles.fieldGroup}>
                  <input
                    style={flowStyles.input}
                    placeholder="Юнусабад · 12-й кв., д. 8, кв. 24"
                    value={state.address}
                    onChange={(e) => onChange({ ...state, address: e.target.value })}
                  />
                  <button style={flowStyles.ghostInlineBtn} onClick={() => setHistoryOpen(!historyOpen)}>
                    Из истории <Icon.ChevronDown size={16} color="var(--brand-500)" />
                  </button>
                  {historyOpen && (
                    <div style={flowStyles.addressDropdown}>
                      {ADDRESS_HISTORY.map((a) => (
                        <div key={a} style={flowStyles.addressDropdownItem} onClick={() => { onChange({ ...state, address: a }); setHistoryOpen(false); }}>{a}</div>
                      ))}
                    </div>
                  )}
                </div>
              </div>

              {/* Время */}
              <div style={flowStyles.section}>
                <span style={flowStyles.sectionTitle}>Время выдачи</span>
                <div style={flowStyles.chipRow}>
                  {["30", "45", "60"].map((m) => (
                    <button
                      key={m}
                      style={{ ...flowStyles.chip, ...(state.promisedTime === m && !showCustomTime ? flowStyles.chipActive : null) }}
                      onClick={() => { onChange({ ...state, promisedTime: m, customTime: "" }); setShowCustomTime(false); }}
                    >
                      {m}&nbsp;мин
                    </button>
                  ))}
                  <button
                    style={{ ...flowStyles.chip, ...(showCustomTime ? flowStyles.chipActive : null) }}
                    onClick={() => setShowCustomTime(!showCustomTime)}
                  >
                    Ручной ввод
                  </button>
                  {showCustomTime && (
                    <input
                      style={flowStyles.customTimeInput}
                      placeholder="например, 75 мин или к 15:30"
                      value={state.customTime}
                      onChange={(e) => onChange({ ...state, customTime: e.target.value })}
                    />
                  )}
                </div>
              </div>

              {/* Комментарий */}
              <div style={flowStyles.section}>
                <span style={flowStyles.sectionTitle}>Комментарий</span>
                <textarea
                  style={flowStyles.textarea}
                  maxLength={200}
                  placeholder="без лука, позвонить за 5 минут, домофон не работает…"
                  value={state.comment}
                  onChange={(e) => onChange({ ...state, comment: e.target.value })}
                />
              </div>

              {/* Способ оплаты */}
              <div style={flowStyles.section}>
                <span style={flowStyles.sectionTitle}>Способ оплаты</span>
                <div style={flowStyles.payGrid}>
                  {PAY_METHODS.map((m) => {
                    const active = state.payment === m.key;
                    const Ic = m.icon;
                    return (
                      <button
                        key={m.key}
                        style={{ ...flowStyles.payTile, ...(active ? flowStyles.payTileActive : null) }}
                        onClick={() => onChange({ ...state, payment: m.key })}
                      >
                        <Ic size={28} color={active ? "var(--brand-500)" : "var(--fg-1)"} />
                        <span>{m.label}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>
          </div>

          <div style={flowStyles.actionBar}>
            <button style={flowStyles.cancelBtn} onClick={onCancel}>Отменить</button>
            <button
              style={{ ...flowStyles.nextBtn, ...(!canNext ? flowStyles.nextBtnDisabled : null) }}
              onClick={() => canNext && onNext()}
              disabled={!canNext}
            >
              <span>Далее: выбор блюд</span>
              <Icon.ArrowRight size={20} color="#fff" />
            </button>
          </div>
        </div>
      );
    }

    // ---------- Step 2: NewOrderMenuPage ----------
    function NewOrderMenuPage({ state, onChange, onBack, onSubmit }) {
      const [activeCat, setActiveCat] = React.useState("mains");
      const [search, setSearch] = React.useState("");
      const [view, setView] = React.useState("photo");

      const filteredByCat = activeCat === "all" || activeCat === "favs"
        ? MENU_PRODUCTS
        : MENU_PRODUCTS.filter((p) => p.cat === activeCat);
      const visible = filteredByCat.filter((p) => p.name.toLowerCase().includes(search.toLowerCase()));

      const cart = state.cart || [];
      const addToCart = (p) => {
        const existing = cart.find((c) => c.id === p.id);
        if (existing) {
          onChange({ ...state, cart: cart.map((c) => c.id === p.id ? { ...c, qty: c.qty + 1 } : c) });
        } else {
          onChange({ ...state, cart: [...cart, { id: p.id, name: p.name, price: p.price, workshop: p.workshop, qty: 1 }] });
        }
      };
      const incQty = (id) => onChange({ ...state, cart: cart.map((c) => c.id === id ? { ...c, qty: c.qty + 1 } : c) });
      const decQty = (id) => {
        const item = cart.find((c) => c.id === id);
        if (!item) return;
        if (item.qty <= 1) onChange({ ...state, cart: cart.filter((c) => c.id !== id) });
        else onChange({ ...state, cart: cart.map((c) => c.id === id ? { ...c, qty: c.qty - 1 } : c) });
      };
      const removeItem = (id) => onChange({ ...state, cart: cart.filter((c) => c.id !== id) });

      const subtotal = cart.reduce((s, c) => s + c.price * c.qty, 0);
      const deliveryFee = 15000;
      const total = subtotal + deliveryFee;
      const canSubmit = cart.length > 0;

      const activeCatLabel = (CATEGORIES.find((c) => c.key === activeCat) || {}).label || "";

      return (
        <div style={flowStyles.page}>
          <div style={flowStyles.subHeader}>
            <span style={flowStyles.pageTitle}>Новый заказ — блюда</span>
            <div style={flowStyles.spacer} />
            <span style={flowStyles.metaText}>
              Гость: {state.customer.name || "—"} · Доставка к {state.customTime || `${state.promisedTime} мин`}
            </span>
            <button
              style={flowStyles.editIconBtn}
              onClick={onBack}
              aria-label="Редактировать детали заказа"
              title="Редактировать детали заказа"
            >
              <Icon.Pencil size={20} color="var(--brand-500)" />
            </button>
          </div>

          <div style={flowStyles.menuBody}>
            {/* CART (left) */}
            <div style={flowStyles.cartWrap}>
              <div style={flowStyles.cartHeader}>
                <span style={flowStyles.cartTitle}>Заказ</span>
                <span style={flowStyles.cartCount}>{cart.length > 0 ? `${cart.length} ${cart.length === 1 ? "позиция" : (cart.length < 5 ? "позиции" : "позиций")}` : "0 позиций"}</span>
              </div>
              <div style={flowStyles.cartBody}>
                {cart.length === 0 ? (
                  <div style={flowStyles.cartEmpty}>Выберите блюда из каталога</div>
                ) : cart.map((it) => (
                  <div key={it.id} style={flowStyles.cartRow}>
                    <div>
                      <div style={flowStyles.cartRowName}>{it.name}</div>
                      <div style={flowStyles.cartRowWorkshop}>{it.workshop}</div>
                    </div>
                    <div style={flowStyles.cartQtyWrap}>
                      <button style={flowStyles.qBtn} onClick={() => decQty(it.id)} aria-label="dec"><Icon.Minus size={18} /></button>
                      <span style={flowStyles.qVal}>{it.qty}</span>
                      <button style={flowStyles.qBtn} onClick={() => incQty(it.id)} aria-label="inc"><Icon.Plus size={18} /></button>
                    </div>
                    <div style={flowStyles.cartRowPrice}>{fmtMoney(it.qty * it.price)}&nbsp;сум</div>
                    <button style={flowStyles.trashBtn} onClick={() => removeItem(it.id)} aria-label="remove">
                      <Icon.X size={20} color="var(--fg-3)" />
                    </button>
                  </div>
                ))}
              </div>
              <div style={flowStyles.cartFooter}>
                <div style={flowStyles.cartFooterRow}><span>Итого</span><span>{fmtMoney(subtotal)}&nbsp;сум</span></div>
                <div style={flowStyles.cartFooterRow}><span>+ Доставка</span><span>{fmtMoney(deliveryFee)}&nbsp;сум</span></div>
                <div style={flowStyles.cartFooterGrand}>
                  <span style={flowStyles.cartFooterGrandLabel}>Всего</span>
                  <span style={flowStyles.cartFooterGrandVal}>{fmtMoney(total)}&nbsp;сум</span>
                </div>
              </div>
              {/* Sticky-кнопка в cart-pane: «Создать заказ» живёт рядом с итогом.
                  Редактирование деталей вынесено в edit-icon в правом верхнем углу sub-header (рядом с именем гостя). */}
              <div style={flowStyles.cartActions}>
                <button
                  style={{ ...flowStyles.cartSubmitBtn, ...(!canSubmit ? flowStyles.cartSubmitBtnDisabled : null) }}
                  onClick={() => canSubmit && onSubmit()}
                  disabled={!canSubmit}
                >
                  <Icon.Check size={22} color="#fff" />
                  <span>Создать заказ</span>
                </button>
              </div>
            </div>

            {/* CATEGORIES (middle) */}
            <div style={flowStyles.catPane}>
              <div style={flowStyles.catGrid}>
                {CATEGORIES.map((c) => {
                  const active = c.key === activeCat;
                  const color = active ? "var(--brand-500)" : "var(--fg-2)";
                  return (
                    <div
                      key={c.key}
                      style={{ ...flowStyles.catTile, ...(active ? flowStyles.catTileActive : null) }}
                      onClick={() => setActiveCat(c.key)}
                    >
                      {c.icon === "star"
                        ? <Icon.Star size={32} color={color} />
                        : <Icon.Folder size={32} color={color} />}
                      <span style={{ ...flowStyles.catTileLabel, ...(active ? flowStyles.catTileLabelActive : null) }}>{c.label}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* PRODUCTS (right) */}
            <div style={flowStyles.prodWrap}>
              <div style={flowStyles.prodTop}>
                <div style={flowStyles.prodSearch}>
                  <input
                    style={flowStyles.prodSearchInput}
                    placeholder="Поиск блюда"
                    value={search}
                    onChange={(e) => setSearch(e.target.value)}
                  />
                  <Icon.Search size={20} color="var(--fg-2)" />
                </div>
                <div style={flowStyles.viewSeg}>
                  <button style={{ ...flowStyles.viewBtn, ...(view === "photo" ? flowStyles.viewBtnOn : null) }} onClick={() => setView("photo")} aria-label="photo">
                    <Icon.Photograph size={20} />
                  </button>
                  <button style={{ ...flowStyles.viewBtn, ...(view === "grid" ? flowStyles.viewBtnOn : null) }} onClick={() => setView("grid")} aria-label="grid">
                    <Icon.ViewGrid size={20} />
                  </button>
                  <button style={{ ...flowStyles.viewBtn, ...(view === "list" ? flowStyles.viewBtnOn : null) }} onClick={() => setView("list")} aria-label="list">
                    <Icon.ViewList size={20} />
                  </button>
                </div>
              </div>
              <div style={flowStyles.prodTabs}>
                <button style={{ ...flowStyles.prodTab, ...(false ? flowStyles.prodTabActive : null) }} onClick={() => setActiveCat("all")}>Главная</button>
                <button style={{ ...flowStyles.prodTab, ...flowStyles.prodTabActive }}>{activeCatLabel}</button>
              </div>
              <div style={flowStyles.prodGrid}>
                {visible.map((p) => (
                  <div key={p.id} style={flowStyles.prodTile} onClick={() => addToCart(p)}>
                    <div style={flowStyles.prodTileImg}>
                      <Icon.Photograph size={36} color="var(--fg-4)" />
                    </div>
                    <div style={flowStyles.prodTileName}>{p.name}</div>
                    <div style={flowStyles.prodTileMeta}>
                      <Icon.Box size={12} color="var(--fg-3)" />
                      <span>{p.workshop}</span>
                    </div>
                    <div style={flowStyles.prodTilePrice}>{fmtMoney(p.price)}&nbsp;сум</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ============================================================
    // OrderDetailSheet — без изменений vs v3 (popover для назначения курьера сохранён).
    // ============================================================
    function OrderDetailSheet({ order, couriers, onClose, onAssignCourier, onChangeStatus, onCancelOrder }) {
      const [courierPopoverOpen, setCourierPopoverOpen] = React.useState(false);
      const [statusDropdownOpen, setStatusDropdownOpen] = React.useState(false);
      const status = QUEUE_STATUS[order.status] || QUEUE_STATUS.new;
      const fmt = (n) => n.toLocaleString("ru-RU").replace(/,/g, " ");
      const assigned = !!order.courier;
      const isLate = order.status === "late";
      const statuses = [
        { key: "new", label: "Новый" },
        { key: "cooking", label: "Готовится" },
        { key: "ready", label: "Готов" },
        { key: "in_way", label: "В пути" },
        { key: "delivered", label: "Доставлен" },
        { key: "cancelled", label: "Отменён" },
      ];

      return (
        <div style={sheetStyles.overlay} onClick={onClose}>
          <div style={{ ...sheetStyles.sheet, ...sheetStyles.sheetNarrow }} onClick={(e) => e.stopPropagation()}>
            <div style={sheetStyles.head}>
              <div style={sheetStyles.odHeadRow}>
                <span style={tablesStyles.queueChannelPill}>{CHANNEL_LABEL[order.channel] || order.channel}</span>
                <span style={{ ...sheetStyles.title, fontSize: 20 }}>#{order.id}</span>
              </div>
              <span style={{ ...tablesStyles.queueStatusPill, background: status.bg, color: status.color, marginLeft: 10 }}>
                {status.label}
              </span>
              <button style={sheetStyles.close} onClick={onClose} aria-label="close"><Icon.X size={24} color="var(--fg-1)" /></button>
            </div>

            <div style={sheetStyles.body}>
              <span style={sheetStyles.odSum}>{order.amount}&nbsp;сум</span>

              <div style={sheetStyles.odBlock}>
                <span style={sheetStyles.sectionLabel}>Адрес</span>
                <span style={sheetStyles.odAddress}>{order.address}</span>
                <div style={sheetStyles.odMapPreview}>
                  <Icon.MapPin size={20} color="var(--fg-3)" /> Карта-превью
                </div>
              </div>

              <div style={sheetStyles.odBlock}>
                <span style={sheetStyles.sectionLabel}>Гость</span>
                <div style={sheetStyles.odGuestRow}>
                  <span style={sheetStyles.odGuestName}>{order.customer && order.customer.name}</span>
                  <PhonePill phone={order.customer && order.customer.phone} />
                </div>
              </div>

              <div style={sheetStyles.odBlock}>
                <span style={sheetStyles.sectionLabel}>Способ оплаты</span>
                <div style={sheetStyles.odKv}><span>{order.payment || "—"}</span></div>
              </div>

              <div style={sheetStyles.odBlock}>
                <span style={sheetStyles.sectionLabel}>Состав</span>
                {(order.items || []).map((it, i) => (
                  <div key={i} style={sheetStyles.odItemRow}>
                    <span>{it.name}</span>
                    <span style={{ color: "var(--fg-2)" }}>× {it.qty}</span>
                    <span style={{ fontWeight: 600 }}>{fmt(it.qty * it.price)}&nbsp;сум</span>
                  </div>
                ))}
              </div>

              {order.comment && (
                <div style={sheetStyles.odBlock}>
                  <span style={sheetStyles.sectionLabel}>Комментарий</span>
                  <div style={sheetStyles.odCommentBlock}>{order.comment}</div>
                </div>
              )}

              <div style={sheetStyles.odBlock}>
                <span style={sheetStyles.sectionLabel}>История</span>
                <div style={sheetStyles.timeline}>
                  {(order.history || []).map((h, i) => {
                    const isLast = i === order.history.length - 1;
                    let dotStyle = sheetStyles.timelineDot;
                    if (h.status === "done") dotStyle = { ...sheetStyles.timelineDot, ...sheetStyles.timelineDotDone };
                    else if (h.status === "current") dotStyle = { ...sheetStyles.timelineDot, ...(isLate && isLast ? sheetStyles.timelineDotLate : sheetStyles.timelineDotCurrent) };
                    return (
                      <div key={i} style={sheetStyles.timelineRow}>
                        <div style={sheetStyles.timelineDotWrap}>
                          <div style={dotStyle} />
                          {!isLast && <div style={sheetStyles.timelineLine} />}
                        </div>
                        <div style={sheetStyles.timelineContent}>
                          <span style={sheetStyles.timelineLabel}>{h.label}</span>
                          <span style={sheetStyles.timelineTime}>{h.time}</span>
                          {isLast && isLate && (<span style={sheetStyles.timelineLateNote}>Опаздывает на 8 мин</span>)}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            <div style={sheetStyles.footer}>
              <div style={{ position: "relative" }}>
                <button style={sheetStyles.primaryGreenBtn} onClick={() => setCourierPopoverOpen(!courierPopoverOpen)}>
                  <Icon.Users size={20} color="#fff" />
                  {assigned ? `Сменить курьера (${order.courier})` : "Назначить курьера"}
                </button>
                {courierPopoverOpen && (
                  <div style={{ ...sheetStyles.courierPopover, position: "absolute", bottom: 64, left: 0, right: 0 }}>
                    {(couriers || []).map((c) => {
                      let dotColor, line;
                      if (c.status === "free") { dotColor = "var(--success-500)"; line = "Свободен"; }
                      else if (c.status === "busy") { dotColor = "var(--brand-500)"; line = `На заказе · ${c.activeOrders}`; }
                      else { dotColor = "var(--fg-3)"; line = "Оффлайн"; }
                      return (
                        <div key={c.id} style={sheetStyles.courierPopoverItem} onClick={() => { setCourierPopoverOpen(false); onAssignCourier && onAssignCourier(c); }}>
                          <div style={{ width: 36, height: 36, borderRadius: "50%", background: "var(--brand-100)", color: "var(--brand-500)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-sans)", fontWeight: 700, fontSize: 14 }}>{c.initials}</div>
                          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                            <span style={{ fontFamily: "var(--font-sans)", fontWeight: 600, fontSize: 14, color: "var(--fg-1)" }}>{c.name}</span>
                            <span style={{ fontFamily: "var(--font-sans)", fontSize: 12, color: dotColor, display: "inline-flex", alignItems: "center", gap: 6 }}>
                              <span style={{ width: 8, height: 8, borderRadius: "50%", background: dotColor, display: "inline-block" }} />{line}
                            </span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              <div style={{ position: "relative" }}>
                <button style={sheetStyles.secondaryPill} onClick={() => setStatusDropdownOpen(!statusDropdownOpen)}>
                  Сменить статус <Icon.ChevronDown size={16} color="var(--fg-2)" />
                </button>
                {statusDropdownOpen && (
                  <div style={{ ...sheetStyles.statusDropdown, position: "absolute", bottom: 56, left: 0, right: 0 }}>
                    {statuses.map((s) => (
                      <div key={s.key} style={sheetStyles.statusDropdownItem} onClick={() => { setStatusDropdownOpen(false); onChangeStatus && onChangeStatus(s); }}>{s.label}</div>
                    ))}
                  </div>
                )}
              </div>
              <button style={sheetStyles.dangerPill} onClick={onCancelOrder}>
                <Icon.Trash size={18} color="var(--danger-500)" /> Отменить заказ
              </button>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [activeNav, setActiveNav]       = React.useState("orders");
      const [activeSubTab, setActiveSubTab] = React.useState("delivery");
      const [activeHall, setActiveHall]     = React.useState("hall-1a");
      const [view, setView]                 = React.useState("grid");
      const [shiftOpen, setShiftOpen]       = React.useState(true);
      const [toast, setToast]               = React.useState(null);
      const [openSheet, setOpenSheet]       = React.useState(null);
      const [newOrderFlow, setNewOrderFlow] = React.useState(null);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(null), 1800); };
      const closeSheet = () => setOpenSheet(null);
      const activeOrder = openSheet && openSheet.kind === "order" ? DELIVERY_ORDERS.find((o) => o.id === openSheet.id) : null;

      const startNewOrder = () => setNewOrderFlow({
        step: "details",
        customer: { phone: "", name: "" },
        address: "",
        promisedTime: "30",
        customTime: "",
        comment: "",
        payment: null,
        cart: [],
      });

      const submitNewOrder = () => {
        const orderNum = 1253 + Math.floor(Math.random() * 8);
        showToast(`Заказ #${orderNum} создан`);
        setNewOrderFlow(null);
      };

      const inFlow = newOrderFlow != null;

      return (
        <div className="app">
          <div className="row">
            <SidebarRail activeKey={activeNav} onChange={(k) => { setActiveNav(k); showToast(`Раздел: ${k}`); }} />
            <div className="main">
              <TopBar
                showMenu={false}
                tenantName="TEST  (IRGASHEV)"
                validUntil="2026-05-24"
                userName="Иргашев Темур"
                userRole="Продавец"
                initials="ИТ"
                mode="Кассовый режим"
                shiftOpen={shiftOpen}
                openedAt="20 мая, 13:08"
                onToggleShift={() => { setShiftOpen(!shiftOpen); showToast(shiftOpen ? "Смена закрыта" : "Смена открыта"); }}
                notificationCount={2}
                onSync={() => showToast("Синхронизация")}
                onToggleTheme={() => showToast("Тёмная тема")}
                onToggleFullscreen={() => showToast("Полноэкранный режим")}
                onNotifications={() => showToast("Уведомления")}
                onLogout={() => showToast("Выход")}
              />
              <div style={{ flex: 1, display: "flex", paddingBottom: 0, minHeight: 0 }}>
                {inFlow ? (
                  newOrderFlow.step === "details" ? (
                    <NewOrderDetailsPage
                      state={newOrderFlow}
                      onChange={(next) => setNewOrderFlow(next)}
                      onCancel={() => setNewOrderFlow(null)}
                      onNext={() => setNewOrderFlow({ ...newOrderFlow, step: "menu" })}
                    />
                  ) : (
                    <NewOrderMenuPage
                      state={newOrderFlow}
                      onChange={(next) => setNewOrderFlow(next)}
                      onBack={() => setNewOrderFlow({ ...newOrderFlow, step: "details" })}
                      onSubmit={submitNewOrder}
                    />
                  )
                ) : (
                  <TablesBoard
                    activeSubTab={activeSubTab}
                    onSubTabChange={setActiveSubTab}
                    halls={HALLS}
                    activeHallKey={activeHall}
                    onHallChange={setActiveHall}
                    onRefresh={() => showToast("Обновлено")}
                    onAddHall={() => showToast("Добавить зал")}
                    view={view}
                    onViewChange={setView}
                    tables={TABLES}
                    onTableClick={(t) => showToast(`Стол: ${t.name}`)}
                    onEditLayout={() => showToast("Редактировать планировку")}
                    deliveryOrders={DELIVERY_ORDERS}
                    reports={REPORTS}
                    onNewDeliveryOrder={startNewOrder}
                    onDeliveryOrderClick={(o) => setOpenSheet({ kind: "order", id: o.id })}
                  />
                )}
              </div>
            </div>
          </div>
          {activeOrder && (
            <OrderDetailSheet
              order={activeOrder}
              couriers={COURIERS}
              onClose={closeSheet}
              onAssignCourier={(c) => showToast(`Назначен курьер: ${c.name}`)}
              onChangeStatus={(s) => showToast(`Статус: ${s.label}`)}
              onCancelOrder={() => { closeSheet(); showToast(`Заказ #${activeOrder.id} отменён`); }}
            />
          )}
          {toast && (
            <div style={{
              position: "fixed", left: "50%", bottom: 32, transform: "translateX(-50%)",
              background: "var(--fg-1)", color: "#fff", padding: "14px 24px", borderRadius: 12,
              fontFamily: "var(--font-sans)", fontWeight: 500, fontSize: 16, boxShadow: "var(--shadow-3)", zIndex: 100,
            }}>{toast}</div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
